<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Peder Frang</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤓</text></svg>"
        />
    </head>
    <body>
        <header class="header">
            <nav>
                <a href="index.html"> Home </a>
                <a href="cv.html"> CV </a>
            </nav>
            <button
                class="print-btn"
                onclick="window.print()"
                title="Save as PDF"
            >
                ⬇ Download PDF
            </button>
        </header>

        <div class="wrapper">
            <main class="cv-page" id="cv-page"></main>
        </div>

        <script src="cv-data.js"></script>
        <script>
            function loadCV() {
                const page = document.getElementById("cv-page");
                page.innerHTML = buildCV(CV_DATA);
            }

            function esc(str) {
                if (!str) return "";
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            function buildCV(d) {
                return `
        ${buildHeader(d)}
        ${buildSidebar(d)}
        ${buildMain(d)}
      `;
            }

            /* ── Header ──────────────────────────────── */
            function buildHeader(d) {
                const c = d.contact;
                // Show city/region (everything after the street address)
                const cityLine = c.address.includes(",")
                    ? c.address.split(",").slice(1).join(",").trim()
                    : c.address;

                const initials = d.name
                    .split(" ")
                    .map((n) => n[0])
                    .join("");
                const photoHtml = d.photo
                    ? `<img src="${esc(d.photo)}" alt="${esc(d.name)}">`
                    : `<span class="cv-header__initials">${esc(initials)}</span>`;

                return `
        <header class="cv-header">
          <div class="cv-header__photo">${photoHtml}</div>
          <div class="cv-header__name">${esc(d.name)}</div>
          <div class="cv-header__meta">
            <span class="cv-header__meta-item">🧑🏼‍💻 ${esc(d.title)}</span>
            <span class="cv-header__meta-sep">◆</span>
            <span class="cv-header__meta-item">🌎 ${esc(cityLine)}</span>
            <span class="cv-header__meta-sep">◆</span>
            <span class="cv-header__meta-item">📞 ${esc(c.phone)}</span>
          </div>
        </header>
      `;
            }

            /* ── Sidebar ─────────────────────────────── */
            function buildSidebar(d) {
                const c = d.contact;
                return `
        <aside class="cv-sidebar">

          <section class="sidebar-section">
            <h2 class="sidebar-section__heading">Details</h2>
            <ul class="details-list">
              <li>${esc(c.address)}</li>
              <li>${esc(c.phone)}</li>
              <li><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></li>
              <li class="detail-label">Date of birth</li>
              <li>${esc(c.dateOfBirth)}</li>
              <li class="detail-label">Nationality</li>
              <li>${esc(c.nationality)}</li>
            </ul>
          </section>

          <section class="sidebar-section">
            <h2 class="sidebar-section__heading">Links</h2>
            <ul class="links-list">
              ${d.links
                  .map(
                      (l) => `
                <li><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a></li>
              `,
                  )
                  .join("")}
            </ul>
          </section>

          <section class="sidebar-section">
            <h2 class="sidebar-section__heading">Skills</h2>
            ${Object.entries(d.skills)
                .map(
                    ([category, items]) => `
              <div class="skills-group">
                <h3 class="skills-group__heading">${esc(category)}</h3>
                <ul class="skills-list">
                  ${items.map((s) => `<li>${esc(s)}</li>`).join("")}
                </ul>
              </div>
            `,
                )
                .join("")}
          </section>

        </aside>
      `;
            }

            /* ── Main content ────────────────────────── */
            function buildMain(d) {
                return `
        <div class="cv-main">
          ${buildProfile(d)}
          ${buildEmployment(d)}
          ${buildEducation(d)}
        </div>
      `;
            }

            function buildProfile(d) {
                return `
        <section>
          <h2 class="main-section__heading">
            <span class="section-icon">&#128100;</span>
            Profile
          </h2>
          ${d.profile.map((p) => `<p class="profile-text">${esc(p)}</p><br/>`).join("")}
        </section>
      `;
            }

            function buildEmployment(d) {
                const items = d.employment
                    .map((job) => {
                        const titleLine =
                            [job.role, job.company, job.location]
                                .filter(Boolean)
                                .join(" at ")
                                .replace(
                                    " at " + job.company,
                                    ` at ${job.company}`,
                                ) + (job.location ? `, ${job.location}` : "");

                        // Build: "Role at Company, Location"
                        const fullTitle = job.location
                            ? `${esc(job.role)} at ${esc(job.company)}, ${esc(job.location)}`
                            : `${esc(job.role)} at ${esc(job.company)}`;

                        const highlights = job.highlights
                            .map(
                                (h) => `
              <div>
                ${h.project ? `<p class="highlight__project">${esc(h.project)}</p>` : ""}
                ${
                    h.bullets && h.bullets.length
                        ? `<ul class="highlight__bullets">
                    ${h.bullets.map((b) => `<li>${esc(b)}</li>`).join("")}
                  </ul>`
                        : ""
                }
              </div>
            `,
                            )
                            .join("");

                        return `
            <article class="timeline-item">
              <div class="job__title-line">${fullTitle}</div>
              <div class="job__period">${esc(job.period)}</div>
              ${job.description ? `<p class="job__description">${esc(job.description)}</p>` : ""}
              ${highlights ? `<div class="job__highlights">${highlights}</div>` : ""}
            </article>
          `;
                    })
                    .join("");

                return `
        <section>
          <h2 class="main-section__heading">
            <span class="section-icon">&#128188;</span>
            Employment History
          </h2>
          <div class="timeline">${items}</div>
        </section>
      `;
            }

            function buildEducation(d) {
                const items = d.education
                    .map(
                        (edu) => `
        <article class="timeline-item">
          <div class="edu-item__title-line">${esc(edu.degree)}${edu.institution ? `, ${esc(edu.institution)}` : ""}</div>
          <div class="edu-item__period">${esc(edu.period)}</div>
        </article>
      `,
                    )
                    .join("");

                return `
        <section>
          <h2 class="main-section__heading">
            <span class="section-icon">&#127891;</span>
            Education
          </h2>
          <div class="timeline">${items}</div>
        </section>
      `;
            }

            loadCV();
        </script>
    </body>
</html>
